name: Release Secret Check

on:
  workflow_dispatch: { }
  push:
    branches:
      - signing_simplifications

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: release
    env:
      PLAY_SERVICE_ACCOUNT: ${{ secrets.PLAY_SERVICE_ACCOUNT }}
      PLAY_SIGNING_KEYSTORE: ${{ secrets.PLAY_SIGNING_KEYSTORE }}
      PLAY_SIGNING_STORE_PASSWORD: ${{ secrets.PLAY_SIGNING_STORE_PASSWORD }}
      PLAY_SIGNING_KEY_ALIAS: ${{ secrets.PLAY_SIGNING_KEY_ALIAS }}
      PLAY_SIGNING_KEY_PASSWORD: ${{ secrets.PLAY_SIGNING_KEY_PASSWORD }}
      GITHUB_SIGNING_KEYSTORE: ${{ secrets.GH_SIGNING_KEYSTORE }}
      GITHUB_SIGNING_STORE_PASSWORD: ${{ secrets.GH_SIGNING_STORE_PASSWORD }}
      GITHUB_SIGNING_KEY_ALIAS: ${{ secrets.GH_SIGNING_KEY_ALIAS }}
      GITHUB_SIGNING_KEY_PASSWORD: ${{ secrets.GH_SIGNING_KEY_PASSWORD }}
      GOOGLE_SERVICES: ${{ secrets.GOOGLE_SERVICES }}
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/build_setup

      - name: Setup Signing
        run: ./scripts/ci_signing_setup.sh

      - name: Setup Play Access
        run: ./scripts/ci_setup_play_access.sh

      - name: Validate release secrets
        shell: bash
        run: |
          set -euo pipefail

          test -s app/src/play/google-services.json
          test -s app/play_service_account.json
          test -s signing/play/signing.keystore
          test -s signing/free/signing.keystore

          ruby -rjson -e 'JSON.parse(File.read(ARGV.fetch(0)))' app/src/play/google-services.json
          ruby -rjson -e 'JSON.parse(File.read(ARGV.fetch(0)))' app/play_service_account.json

          keytool -list \
            -keystore signing/play/signing.keystore \
            -storepass "$PLAY_SIGNING_STORE_PASSWORD" \
            -alias "$PLAY_SIGNING_KEY_ALIAS" \
            >/dev/null

          keytool -list \
            -keystore signing/free/signing.keystore \
            -storepass "$GITHUB_SIGNING_STORE_PASSWORD" \
            -alias "$GITHUB_SIGNING_KEY_ALIAS" \
            >/dev/null

          mkdir -p build/release-secret-check/play build/release-secret-check/github
          echo ok > build/release-secret-check/play/file
          echo ok > build/release-secret-check/github/file
          jar cf build/release-secret-check/play/check.jar -C build/release-secret-check/play file
          jar cf build/release-secret-check/github/check.jar -C build/release-secret-check/github file

          jarsigner \
            -keystore signing/play/signing.keystore \
            -storepass "$PLAY_SIGNING_STORE_PASSWORD" \
            -keypass "$PLAY_SIGNING_KEY_PASSWORD" \
            build/release-secret-check/play/check.jar \
            "$PLAY_SIGNING_KEY_ALIAS" \
            >/dev/null

          jarsigner \
            -keystore signing/free/signing.keystore \
            -storepass "$GITHUB_SIGNING_STORE_PASSWORD" \
            -keypass "$GITHUB_SIGNING_KEY_PASSWORD" \
            build/release-secret-check/github/check.jar \
            "$GITHUB_SIGNING_KEY_ALIAS" \
            >/dev/null
