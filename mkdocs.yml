site_name: Voice
site_description: "Voice is an open source audiobook player built for simplicity and accessibility. Listen to, organize, and enjoy your audiobooks effortlessly."
site_author: Paul Woitaschek
site_url: https://voice.woitaschek.de

repo_url: https://github.com/VoiceAudiobook/Voice
repo_name: "Voice on GitHub"

nav:
  - Home: index.md
  - Organizing Audiobooks: organizing.md
  - Privacy Policy: privacy-policy.md
  - License: license.md
  - Contributing: contributing.md
  - About: about.md
  - Development: development.md
  - Architecture: architecture.md
  - FAQ: faq.md

theme:
  name: material
  logo: logo.png
  favicon: logo.png
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.instant
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences

plugins:
  - redirects:
      redirect_maps:
        'privacy_policy.md': 'privacy-policy.md'
        'privacy.md': 'privacy-policy.md'

copyright: <a href="https://woitaschek.de/impressum/">Impressum</a>
